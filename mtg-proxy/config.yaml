name: "MTProto Proxy"
version: "1.0.0"
slug: "mtg_proxy_test"    # оставьте новый slug, чтобы не конфликтовать
description: "Test addon"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
init: false
ports:
  9443/tcp: 9443
ports_description:
  9443/tcp: "MTProto Proxy Port"
options:
  debug: false
  secret: "xxxxx"
  bind-to: "0.0.0.0:9443"
  concurrency: 8192
  prefer-ip: "only-ipv4"
  auto-update: true
  tolerate-time-skewness: "5s"
  allow-fallback-on-unknown-dc: false
schema:
  debug: bool
  secret: str
  bind-to: str
  concurrency: int
  prefer-ip:
    type: str
    match:
      - "prefer-ipv4"
      - "prefer-ipv6"
      - "only-ipv4"
      - "only-ipv6"
  auto-update: bool
  tolerate-time-skewness: str
  allow-fallback-on-unknown-dc: bool
