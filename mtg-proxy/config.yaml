name: "MTProto Proxy"
version: "1.1.3"
slug: "mtg_proxy_test"
description: "MTProto proxy for Telegram"
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
init: false
ports:
  9443/tcp: 9443
ports_description:
  9443/tcp: "MTProto Proxy Port"
options:
  debug: false
  secret: "xxxxx"
  bind_to: "0.0.0.0:9443"
  concurrency: 8192
  prefer_ip: "only-ipv4"
  auto_update: true
  tolerate_time_skewness: "5s"
  allow_fallback_on_unknown_dc: false
  network:
    dns: "https://1.1.1.1"
    proxies:
      - "socks5://192.168.2.1:1122"
    timeout:
      tcp: "5s"
      http: "10s"
      idle: "1m"
schema:
  debug: bool
  secret: str
  bind_to: str
  concurrency: int
  prefer_ip: str
  auto_update: bool
  tolerate_time_skewness: str
  allow_fallback_on_unknown_dc: bool
  network:
    type: dict
    schema:
      dns: str
      proxies:
        type: list
        schema: str
      timeout:
        type: dict
        schema:
          tcp: str
          http: str
          idle: str
